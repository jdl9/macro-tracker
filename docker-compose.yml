version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    environment:
      - DATABASE_URL=file:/app/prisma/data/macro-tracker.db
      - NODE_ENV=production
    volumes:
      - sqlite-data:/app/prisma/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/goals"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  sqlite-data:
    driver: local
